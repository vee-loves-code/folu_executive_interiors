<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin Sign In — Folu Executive Interior</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">

<header class="admin-header">
  <div class="admin-header-inner">
    <a href="index.html" class="logo">
      <span class="logo-mark">F</span>
      <span class="logo-text">Folu <em>Executive</em> Interior</span>
    </a>
    <span class="admin-tag">Admin · Consultations</span>
  </div>
</header>

<main class="admin-main">
  <section class="admin-login">
    <form class="admin-login-form" id="loginForm">
      <h2>Admin Sign In</h2>
      <p class="admin-login-sub">Enter your dashboard credentials to view consultation requests.</p>
      <input type="text" name="username" placeholder="Username" autocomplete="username" required>
      <input type="password" name="password" placeholder="Password" autocomplete="current-password" required>
      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      <p class="admin-login-error" id="loginError"></p>
    </form>
  </section>
</main>

<div class="auth-toast" id="authToast">
  <div class="auth-toast-card">
    <span class="auth-toast-check">&#10003;</span>
    <span>Sign in successful</span>
  </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
