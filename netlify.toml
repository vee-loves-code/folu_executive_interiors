[build]
  base = "web"
  publish = "web"

# Consultation form + admin dashboard call this same-origin path;
# Netlify proxies it straight through to the Render-hosted API so the
# browser only ever talks to foluexecutiveinteriors.netlify.app.
[[redirects]]
  from = "/api/*"
  to = "https://folu-executive-interior-api.onrender.com/api/:splat"
  status = 200
  force = true
